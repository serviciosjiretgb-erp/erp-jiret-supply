<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sin conexión — G&B ERP</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#000;color:#fff;min-height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
    .logo{font-size:48px;font-weight:900;margin-bottom:8px}
    .logo span{color:#f97316}
    h1{font-size:20px;font-weight:800;text-transform:uppercase;letter-spacing:2px;margin:24px 0 8px}
    p{font-size:14px;color:#9ca3af;line-height:1.6;max-width:300px}
    .icon{font-size:64px;margin-bottom:16px}
    button{margin-top:32px;background:#f97316;color:#000;border:none;padding:14px 32px;border-radius:14px;font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:1px;cursor:pointer;width:100%;max-width:280px}
    button:active{opacity:.8}
    .tip{margin-top:16px;font-size:11px;color:#4b5563;font-weight:600}
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <div class="logo">G<span>&</span>B</div>
  <h1>Sin Conexión</h1>
  <p>El sistema ERP requiere conexión a internet para sincronizar con Firebase. Verifica tu red e intenta nuevamente.</p>
  <button onclick="window.location.reload()">🔄 Reintentar</button>
  <p class="tip">Los datos se sincronizarán automáticamente al restaurar la conexión</p>
</body>
</html>
