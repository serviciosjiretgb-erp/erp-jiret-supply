<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="G&amp;B ERP" />
    <meta name="application-name" content="G&amp;B ERP" />
    <meta name="theme-color" content="#000000" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>G&amp;B Supply — ERP</title>
    <style>
      html, body { overscroll-behavior: none; -webkit-overflow-scrolling: touch; }
      body { padding-bottom: env(safe-area-inset-bottom); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(reg => {
              setInterval(() => reg.update(), 30 * 60 * 1000);
              reg.addEventListener('updatefound', () => {
                const sw = reg.installing;
                sw.addEventListener('statechange', () => {
                  if (sw.state === 'installed' && navigator.serviceWorker.controller)
                    if (window.__showUpdateBanner) window.__showUpdateBanner();
                });
              });
            }).catch(e => console.error('[PWA]', e));
        });
      }
      window.addEventListener('beforeinstallprompt', e => {
        e.preventDefault();
        window.__pwaInstallPrompt = e;
        window.dispatchEvent(new Event('pwa-install-available'));
      });
      window.addEventListener('appinstalled', () => { window.__pwaInstallPrompt = null; });
    </script>
  </body>
</html>
